<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chat Log Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Memuat library JSZip untuk membaca file .zip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div class="header-panel">
        <h2>WhatsApp Chat Log Viewer</h2>
        <div class="file-input-wrapper">
            <input type="file" id="uploadFile" class="btn-upload" accept=".txt,.zip">
        </div>

        <!-- Section Input Alias Dinamis -->
        <div class="alias-section">
            <h3>Daftar Alias (Opsional)</h3>
            <p>Masukkan nomor HP (sesuai format di log) dan nama penggantinya</p>
            <div id="aliasInputs">
                <div class="alias-row">
                    <input type="text" placeholder="Contoh: +62 858-1115-9868" class="input-phone">
                    <input type="text" placeholder="Nama Panggilan (Contoh: Deo)" class="input-name">
                </div>
            </div>
            <button type="button" id="addAliasBtn" class="btn-small">+ Tambah Baris</button>
            <button type="button" id="applyAliasBtn" class="btn-small btn-apply">Terapkan Alias</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="system-bubble">Silakan pilih file <b>.txt</b> atau langsung file <b>.zip</b> hasil export chat untuk memproses beserta medianya.</div>
    </div>

    <script src="parser.js"></script>
    <script src="app.js"></script>
</body>
</html>
